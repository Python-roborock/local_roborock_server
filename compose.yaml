services:
  roborock-local-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roborock-local-server
    restart: unless-stopped
    ports:
      - "${ROBOROCK_SERVER_HTTPS_PORT:-555}:${ROBOROCK_SERVER_HTTPS_PORT:-555}"
      - "${ROBOROCK_SERVER_MQTT_TLS_PORT:-8881}:${ROBOROCK_SERVER_MQTT_TLS_PORT:-8881}"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./data:/data
      - ./secrets:/run/secrets:ro
    healthcheck:
      # Defaults to https for local_tls. Set ROBOROCK_SERVER_HEALTHCHECK_SCHEME=http
      # when listener_mode = "external_tls" (the server speaks plain HTTP behind the proxy).
      test: ["CMD", "curl", "-skf", "${ROBOROCK_SERVER_HEALTHCHECK_SCHEME:-https}://127.0.0.1:${ROBOROCK_SERVER_HTTPS_PORT:-555}/admin"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
